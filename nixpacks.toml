[phases.setup]
nixPkgs = ["nodejs_20", "python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = ["npm ci", "python -m venv /app/.venv && /app/.venv/bin/pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "/app/.venv/bin/gunicorn server:app --bind 0.0.0.0:$PORT"
