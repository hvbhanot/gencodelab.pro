[phases.setup]
nixPkgs = ["nodejs_22", "python311", "python311Packages.pip", "gcc"]

[phases.install]
cmds = []

[phases.build]
cmds = ["npm install --prefer-offline", "python -m venv /app/.venv", "/app/.venv/bin/pip install --no-cache-dir -r requirements.txt", "npm run build"]

[start]
cmd = "/app/.venv/bin/gunicorn server:app --bind 0.0.0.0:$PORT"
